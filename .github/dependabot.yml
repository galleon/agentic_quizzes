version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      qdrant:
        patterns: ["qdrant-client"]
      ollama:
        patterns: ["ollama"]
      pydantic:
        patterns: ["pydantic*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
